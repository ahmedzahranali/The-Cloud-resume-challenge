name: Frontend Deployment

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
permissions:
  id-token: write   # This is required for requesting the JWT
  contents: read    # This is required for actions/checkout

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install pytest moto boto3
      - name: Run tests
        run: |
          cd backend
          pytest

  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        # Use the Role ARN instead of Access Keys
        role-to-assume: arn:aws:iam::862264091652:role/GitHubActionsWorkflowRole
        aws-region: us-east-2

    - name: Deploy to S3
      run: aws s3 sync ./frontend s3://${{ secrets.AWS_S3_BUCKET }} --delete

    - name: Invalidate CloudFront
      run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Zip Lambda Function
      run: |
        cd backend
        zip -r ../function.zip .

    - name: Deploy Lambda Function
      run: |
        aws lambda update-function-code \
          --function-name cloud-resume-challenge \
          --region us-east-1 \
          --zip-file fileb://function.zip
