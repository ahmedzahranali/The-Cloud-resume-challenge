name: Cloud Resume Full Pipeline

on:
  push:
    branches: [ main ]

jobs:
  # 1. Trigger the external Quality Gates
  run-quality-gates:
    uses: ./.github/workflows/test-and-validate.yml

  # 2. Deploy Everything (Runs only if Quality Gates pass)
  deploy:
    runs-on: ubuntu-latest
    needs: run-quality-gates 
    steps:
      - uses: actions/checkout@v4
      
      # Authenticate securely using OIDC
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # --- INFRASTRUCTURE (Terraform) ---
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: cd infra && terraform init

      - name: Terraform Apply
        run: cd infra && terraform apply -auto-approve

      # --- FRONTEND (S3 & CloudFront) ---
      - name: Deploy to S3
        run: aws s3 sync ./frontend s3://${{ secrets.AWS_S3_BUCKET }} --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"

      # --- BACKEND (Lambda) ---
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Zip Lambda Function
        run: |
          cd backend
          zip -r ../function.zip .

      - name: Deploy Lambda Function
        run: |
          aws lambda update-function-code \
            --function-name cloud-resume-challenge \
            --region us-east-1 \
            --zip-file fileb://function.zip
