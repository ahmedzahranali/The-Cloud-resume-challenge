name: Test and Validate

on: workflow_call 

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          cd backend
          pip install pytest moto boto3
      - name: Run tests
        run: |
          cd backend
          pytest

  terraform-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        run: cd infra && terraform init -backend=false 
      - name: Check Formatting
        run: cd infra && terraform fmt -check
      - name: Validate Syntax
        run: cd infra && terraform validate -no-color

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci || npm install @playwright/test
      - name: Install Browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E Tests
        run: npx playwright test tests/portfolio.spec.js
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always() # This ensures the report is uploaded even on failure
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
